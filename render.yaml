services:
  - type: web
    name: bubstal-product-catalog
    runtime: node
    plan: free
    rootDir: full-stack-20260520T122017Z-3-001/full-stack
    buildCommand: cd backend && npm install && cd ../frontend && npm install && npx vite build
    startCommand: cd backend && npm run setup && node src/production.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "22"
